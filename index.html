<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drew Store</title>
    <style>
        body{
            margin:0;
            background:#111;
            color:white;
            font-family:Arial,sans-serif;
        }
        header{
            background:#00b894;
            padding:20px;
            text-align:center;
        }
        .box{
            max-width:900px;
            margin:30px auto;
            padding:20px;
        }
        .card{
            background:#222;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }
        button{
            background:#00b894;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
        }
    </style>
</head>
<body>

<header>
    <h1>Drew Store</h1>
    <p>Website Drew Store bán Acc Minecraft - Free Fire</p>
</header>

<div class="box">
    <div class="bank">
        <h2>Acc Minecraft Premium</h2>
        <p>Giá: 150.000đ</p>
        <button>Mua ngay</button>
    </div>

    <div class="card">
        <h2>Acc Free Fire</h2>
        <p>Giá: 300.000đ</p>
        <button>Chọn Acc</button>
    </div>
</div>

</body>
</html>
